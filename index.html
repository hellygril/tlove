<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>给最爱的你 ❤️</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
body {
  background: #fff5f2;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

#confession-page {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffebf2;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hidden { display: none !important; }

#lock-page { text-align: center; position: relative; z-index: 10; }
.lock {
  font-size: 100px;
  animation: beat 1.2s infinite ease-in-out;
  cursor: pointer;
  user-select: none;
}
.tip {
  margin-top: 20px;
  font-size: 18px;
  color: #ff4d7a;
}

#choice-page {
  text-align: center;
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.question {
  font-size: 24px;
  color: #333;
  margin-bottom: 40px;
}
.btn {
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin: 0 10px;
  transition: all 0.3s;
  white-space: nowrap;
}
.btn-yes {
  background: #ff4d7a;
  color: white;
  position: relative;
  z-index: 10;
}
.btn-no {
  background: #eee;
  color: #666;
  position: absolute;
  white-space: nowrap;
  padding: 12px 28px;
  z-index: 999;
  display: block !important;
  visibility: visible !important;
  opacity: 1 !important;
}

#count-page {
  font-size: 120px;
  font-weight: bold;
  color: #ff4d7a;
  animation: scaleBeat 1s infinite alternate;
}

.fall {
  position: fixed;
  pointer-events: none;
  animation: fallDown linear forwards;
}
.fall::after { content: '❤️'; font-size: inherit; }

.burst {
  position: fixed;
  pointer-events: none;
  animation: burstAni 0.9s ease-out forwards;
}
.burst::after { content: '❤️'; font-size: inherit; }

.fly-text {
  position: fixed;
  color: #b861ff;
  font-weight: bold;
  font-size: 16px;
  pointer-events: none;
  animation: flyUp 1.5s forwards;
}

.confession-text {
  font-size: 30px;
  color: #ff4d7a;
  text-align: center;
  animation: fadeIn 1s forwards, glow 2s infinite alternate;
  line-height: 1.8;
  position: relative;
  z-index: 2;
  text-shadow: 0 0 3px white;
}
.hint {
  margin-top: 20px;
  font-size: 16px;
  color: #ff4d7a;
  position: relative;
  z-index: 2;
  text-shadow: 0 0 2px white;
}

.kiss {
  position: fixed;
  font-size: 40px;
  z-index: 999;
  animation: kissPop 0.8s forwards;
  pointer-events: none;
}

@keyframes beat {
  0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); }
}
@keyframes scaleBeat {
  0% { transform: scale(1); }
  100% { transform: scale(1.3); }
}
@keyframes fallDown {
  0% { transform: translateY(-10px) rotate(0deg); opacity:1; }
  100% { transform: translateY(105vh) rotate(360deg); opacity:0.6; }
}
@keyframes burstAni {
  0% { transform: scale(1) translate(0,0); opacity:1; }
  100% { transform: scale(0.4) translate(var(--x), var(--y)); opacity:0; }
}
@keyframes fadeIn {
  from { opacity:0; transform: scale(0.8); }
  to { opacity:1; transform: scale(1); }
}
@keyframes flyUp {
  0% { opacity:1; transform: translateY(0); }
  100% { opacity:0; transform: translateY(-60px); }
}
@keyframes glow {
  from { text-shadow: 0 0 10px rgba(255,77,122,0.3); }
  to { text-shadow: 0 0 20px rgba(255,77,122,0.6); }
}
@keyframes kissPop {
  0% { transform: scale(0.5); opacity:1; }
  100% { transform: scale(1.2); opacity:0; }
}
</style>
</head>
<body>

<!-- 1 点击解锁 -->
<div id="lock-page">
  <div class="lock" id="lock">🔒</div>
  <p class="tip">点击打开惊喜</p>
</div>

<!-- 2 选择题 -->
<div id="choice-page" class="hidden">
  <p class="question">你爱我吗？</p>
  <button class="btn btn-yes" id="yes-btn">爱 ❤️</button>
  <button class="btn btn-no" id="no-btn">不爱</button>
</div>

<!-- 3 倒计时 -->
<div id="count-page" class="hidden">5</div>

<!-- 4 最终告白页 -->
<div id="confession-page" class="hidden">
  <p class="confession-text">
    余生漫漫，庆幸是你<br>
    三餐四季，岁岁年年<br>
   我会一直爱你，永远
  </p>
  <p class="hint">👉 点击/长按屏幕都有惊喜</p>
</div>

<script>
function r(min, max) { return Math.random() * (max - min) + min; }

const sweetTexts = [
  '老公我爱你','有你真好','一辈子',
  '永远在一起','超爱你','平安喜乐',
  '岁岁年年','越来越好','幸福满满',
  '余生相伴','不离不弃','只对你心动'
];

// 切换页面
function showPage(id) {
  document.querySelectorAll('body>div').forEach(e=> e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// 1 点击解锁
document.getElementById('lock').addEventListener('click', ()=>{
  showPage('choice-page');
});

// 2 不爱按钮：点击就跑，无弹窗
const noBtn = document.getElementById('no-btn');

function moveNoBtn() {
  let w = 80;
  let h = 45;
  let maxX = window.innerWidth - w - 30;
  let maxY = window.innerHeight - h - 30;
  noBtn.style.left = r(30, maxX) + 'px';
  noBtn.style.top = r(30, maxY) + 'px';
}

setTimeout(moveNoBtn, 100);

noBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  moveNoBtn();
});

document.getElementById('yes-btn').addEventListener('click', ()=>{
  showPage('count-page');
  startCount();
});

// 3 倒计时
function startCount() {
  let num = 5;
  const el = document.getElementById('count-page');
  const timer = setInterval(()=>{
    num--;
    if(num <= 0) {
      clearInterval(timer);
      burstAll();
      setTimeout(()=>{
        showPage('confession-page');
        startFallHearts('confession-page');
      }, 1000);
    }
    el.innerText = num;
  }, 600);
}

// 全屏炸爱心
function burstAll() {
  for(let i=0;i<50;i++){
    const b=document.createElement('div');
    b.className='burst';
    b.style.fontSize=r(12,22)+'px';
    const ang=r(0,Math.PI*2);
    const dist=r(100,350);
    b.style.setProperty('--x', Math.cos(ang)*dist+'px');
    b.style.setProperty('--y', Math.sin(ang)*dist+'px');
    document.body.appendChild(b);
    setTimeout(()=>b.remove(), 1000);
  }
}

// 飘爱心
function startFallHearts(containerId) {
  setInterval(()=>{
    const f=document.createElement('div');
    f.className='fall';
    f.style.fontSize=r(12,22)+'px';
    f.style.left=r(0,window.innerWidth)+'px';
    f.style.animationDuration=r(5,9)+'s';
    document.getElementById(containerId).appendChild(f);
    setTimeout(()=>f.remove(),10000);
  },450);
}

// 4 最终页互动
const endPage = document.getElementById('confession-page');
endPage.addEventListener('click',(e)=>{
  flyWord(e);
  flyHeart(e);
});
endPage.addEventListener('contextmenu',(e)=>{
  e.preventDefault();
  flyWord(e);
  flyHeart(e);
});

// 长按亲亲
let longPress;
endPage.addEventListener('touchstart',(e)=>{
  longPress = setTimeout(()=>{
  },800);
});
endPage.addEventListener('touchend',()=>clearTimeout(longPress));

// 飘字
function flyWord(e) {
  const t=document.createElement('div');
  t.className='fly-text';
  t.innerText=sweetTexts[Math.floor(r(0,sweetTexts.length))];
  t.style.left=(e.clientX-20)+'px';
  t.style.top=(e.clientY-20)+'px';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1500);
}

// 飘心
function flyHeart(e) {
  const h=document.createElement('div');
  h.className='fall';
  h.innerText='❤️';
  h.style.position='fixed';
  h.style.left=e.clientX+'px';
  h.style.top=e.clientY+'px';
  h.style.fontSize=r(14,24)+'px';
  h.style.animation=`fallDown ${r(3,5)}s linear forwards`;
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
}

startFallHearts('confession-page');
</script>
</body>
</html>
