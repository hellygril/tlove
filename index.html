<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>给最爱的你 ❤️</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
}
body {
  background: #fff5f8;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 最终页背景：你们合照 */
#confession-page {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
#confession-page::before {
  content: '';
  position: absolute;
  top: 0;left:0;right:0;bottom:0;
  background: rgba(255,255,255,0.55);
  z-index: 1;
}

.hidden { display: none !important; }

/* 长按解锁 */
#lock-page { text-align: center; position: relative; z-index: 10; }
.lock {
  font-size: 100px;
  animation: beat 1.2s infinite ease-in-out;
  cursor: pointer;
  user-select: none;
}
.tip {
  margin-top: 20px;
  font-size: 18px;
  color: #ff4d7a;
}
.long-tip {
  margin-top: 10px;
  font-size: 14px;
  color: #ff7ba5;
}

/* 选择题 */
#choice-page { text-align: center; position: relative; z-index: 10; }
.question {
  font-size: 24px;
  color: #333;
  margin-bottom: 40px;
}
.btn {
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin: 0 10px;
  transition: all 0.3s;
}
.btn-yes { background: #ff4d7a; color: white; }
.btn-no { background: #eee; color: #666; position: absolute; }

/* 倒计时 */
#count-page {
  font-size: 60px;
  font-weight: bold;
  color: #ff4d7a;
  animation: scaleBeat 1s infinite alternate;
}

/* 爱心动画 */
.fall {
  position: fixed;
  pointer-events: none;
  animation: fallDown linear forwards;
}
.fall::after { content: '❤️'; font-size: inherit; }

.burst {
  position: fixed;
  pointer-events: none;
  animation: burstAni 0.9s ease-out forwards;
}
.burst::after { content: '❤️'; font-size: inherit; }

/* 点击飘字 */
.fly-text {
  position: fixed;
  color: #ff4d7a;
  font-weight: bold;
  font-size: 16px;
  pointer-events: none;
  animation: flyUp 1.5s forwards;
}

/* 弹窗 */
.pop {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,77,122,0.9);
  color: #fff;
  padding: 14px 24px;
  border-radius: 20px;
  z-index: 999;
  animation: popFade 1.2s forwards;
  font-size: 16px;
  white-space: nowrap;
}

/* 最终文字 */
.confession-text {
  font-size: 30px;
  color: #ff4d7a;
  text-align: center;
  animation: fadeIn 1s forwards, glow 2s infinite alternate;
  line-height: 1.8;
  position: relative;
  z-index: 2;
  text-shadow: 0 0 3px white;
}
.hint {
  margin-top: 20px;
  font-size: 16px;
  color: #ff4d7a;
  position: relative;
  z-index: 2;
  text-shadow: 0 0 2px white;
}

/* 亲亲特效 */
.kiss {
  position: fixed;
  font-size: 40px;
  z-index: 999;
  animation: kissPop 0.8s forwards;
  pointer-events: none;
}

@keyframes beat {
  0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); }
}
@keyframes scaleBeat {
  0% { transform: scale(1); }
  100% { transform: scale(1.3); }
}
@keyframes fallDown {
  0% { transform: translateY(-10px) rotate(0deg); opacity:1; }
  100% { transform: translateY(105vh) rotate(360deg); opacity:0.6; }
}
@keyframes burstAni {
  0% { transform: scale(1) translate(0,0); opacity:1; }
  100% { transform: scale(0.4) translate(var(--x), var(--y)); opacity:0; }
}
@keyframes fadeIn {
  from { opacity:0; transform: scale(0.8); }
  to { opacity:1; transform: scale(1); }
}
@keyframes flyUp {
  0% { opacity:1; transform: translateY(0); }
  100% { opacity:0; transform: translateY(-60px); }
}
@keyframes popFade {
  0% { opacity:0; transform: translate(-50%,-50%) scale(0.7); }
  50% { opacity:1; transform: translate(-50%,-50%) scale(1.1); }
  100% { opacity:0; transform: translate(-50%,-50%) scale(1); }
}
@keyframes glow {
  from { text-shadow: 0 0 10px rgba(255,77,122,0.3); }
  to { text-shadow: 0 0 20px rgba(255,77,122,0.6); }
}
@keyframes kissPop {
  0% { transform: scale(0.5); opacity:1; }
  100% { transform: scale(1.2); opacity:0; }
}
</style>
</head>

<body>

<!-- 1 长按解锁 -->
<div id="lock-page">
  <div class="lock" id="lock">🔒</div>
  <p class="tip">点开有惊喜</p>
  <p class="long-tip">长按打开哦</p>
</div>

<!-- 2 选择题（女生版） -->
<div id="choice-page" class="hidden">
  <p class="question">你爱我吗？</p>
  <button class="btn btn-yes" id="yes-btn">爱 ❤️</button>
  <button class="btn btn-no" id="no-btn">不爱</button>
</div>

<!-- 3 倒计时 -->
<div id="count-page" class="hidden">5</div>

<!-- 4 最终告白页 -->
<div id="confession-page" class="hidden">
  <p class="confession-text">
    余生漫漫，庆幸是你<br>
    三餐四季，岁岁年年<br>
    吵不离，骂不散，这就是我们<br>
    我会一直爱你，永远
  </p>
  <p class="hint">👉 点击/长按屏幕都有惊喜</p>
</div>

<script>
function r(min, max) { return Math.random() * (max - min) + min; }

const sweetTexts = [
  '老公我爱你','有你真好','一辈子',
  '永远在一起','超爱你','平安喜乐',
  '岁岁年年','越来越好','幸福满满',
  '余生相伴','不离不弃','只对你心动'
];
const popTexts = ['就知道你舍不得','不许耍赖哦','乖乖选爱我啦','逃不掉的～'];

// 切换页面
function showPage(id) {
  document.querySelectorAll('body>div').forEach(e=> e.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// 1 长按解锁
let pressTimer;
document.getElementById('lock').addEventListener('mousedown', ()=>{
  pressTimer = setTimeout(()=>showPage('choice-page'),600);
});
document.getElementById('lock').addEventListener('mouseup', ()=>clearTimeout(pressTimer));
document.getElementById('lock').addEventListener('touchstart', ()=>{
  pressTimer = setTimeout(()=>showPage('choice-page'),600);
});
document.getElementById('lock').addEventListener('touchend', ()=>clearTimeout(pressTimer));

// 2 选择题：不爱按钮乱跑
const noBtn = document.getElementById('no-btn');
function moveNoBtn() {
  noBtn.style.left = r(50, window.innerWidth - 120) + 'px';
  noBtn.style.top = r(100, window.innerHeight - 80) + 'px';
}
noBtn.addEventListener('mouseenter', moveNoBtn);
noBtn.addEventListener('click', () => {
  showPop(popTexts[Math.floor(r(0, popTexts.length))]);
  moveNoBtn();
});

document.getElementById('yes-btn').addEventListener('click', ()=>{
  showPage('count-page');
  startCount();
});

// 3 倒计时 5→1
function startCount() {
  let num = 5;
  const el = document.getElementById('count-page');
  const timer = setInterval(()=>{
    num--;
    if(num <= 0) {
      clearInterval(timer);
      burstAll();
      setTimeout(()=>{
        showPage('confession-page');
        startFallHearts('confession-page');
      }, 1000);
    }
    el.innerText = num;
  }, 600);
}

// 全屏炸爱心
function burstAll() {
  for(let i=0;i<50;i++){
    const b=document.createElement('div');
    b.className='burst';
    b.style.fontSize=r(12,22)+'px';
    const ang=r(0,Math.PI*2);
    const dist=r(100,350);
    b.style.setProperty('--x', Math.cos(ang)*dist+'px');
    b.style.setProperty('--y', Math.sin(ang)*dist+'px');
    document.body.appendChild(b);
    setTimeout(()=>b.remove(), 1000);
  }
}

// 飘爱心
function startFallHearts(containerId) {
  setInterval(()=>{
    const f=document.createElement('div');
    f.className='fall';
    f.style.fontSize=r(12,22)+'px';
    f.style.left=r(0,window.innerWidth)+'px';
    f.style.animationDuration=r(5,9)+'s';
    document.getElementById(containerId).appendChild(f);
    setTimeout(()=>f.remove(),10000);
  },450);
}

// 4 最终页互动
const endPage = document.getElementById('confession-page');
endPage.addEventListener('click',(e)=>{
  flyWord(e);
  flyHeart(e);
});
endPage.addEventListener('contextmenu',(e)=>{
  e.preventDefault();
  flyWord(e);
  flyHeart(e);
  showKiss(e);
  showPop('么么哒❤️');
});

// 长按亲亲
let longPress;
endPage.addEventListener('touchstart',(e)=>{
  longPress = setTimeout(()=>{
    showKiss(e.touches[0]);
    showPop('爱你哟❤️');
  },800);
});
endPage.addEventListener('touchend',()=>clearTimeout(longPress));

// 飘字
function flyWord(e) {
  const t=document.createElement('div');
  t.className='fly-text';
  t.innerText=sweetTexts[Math.floor(r(0,sweetTexts.length))];
  t.style.left=(e.clientX-20)+'px';
  t.style.top=(e.clientY-20)+'px';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1500);
}

// 飘心
function flyHeart(e) {
  const h=document.createElement('div');
  h.className='fall';
  h.innerText='❤️';
  h.style.position='fixed';
  h.style.left=e.clientX+'px';
  h.style.top=e.clientY+'px';
  h.style.fontSize=r(14,24)+'px';
  h.style.animation=`fallDown ${r(3,5)}s linear forwards`;
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
}

// 弹窗
function showPop(txt) {
  const p=document.createElement('div');
  p.className='pop';
  p.innerText=txt;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),1200);
}

// 亲亲
function showKiss(p) {
  const k=document.createElement('div');
  k.className='kiss';
  k.innerText='💋';
  k.style.left=(p.clientX-20)+'px';
  k.style.top=(p.clientY-20)+'px';
  document.body.appendChild(k);
  setTimeout(()=>k.remove(),800);
}

startFallHearts('confession-page');
</script>
</body>
</html>
